<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Tetris JS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        #score { font-size: 30px; font-weight: bold; }
        #instructions { font-size: 14px; opacity: 0.8; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="instructions">Arrows: Move & Rotate<br>Down: Drop faster</div>
    </div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- GAME CONFIG ---
        const COLS = 12;
        const ROWS = 20;
        const BLOCK_SIZE = 1;

        let score = 0;
        let arena = createMatrix(COLS, ROWS);

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);

        camera.position.set(COLS / 2, ROWS / 2, 20);
        camera.lookAt(COLS / 2, ROWS / 2, 0);

        // Colors for pieces
        const colors = [null, 0xFF0D72, 0x0DC2FF, 0x0DFF72, 0xF538FF, 0xFF8E0D, 0xFFE138, 0x3877FF];

        // Helper to create 3D cubes
        const cubeGeo = new THREE.BoxGeometry(0.95, 0.95, 0.95); // slightly smaller than 1 for "grid" look

        // --- GAME LOGIC ---
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
        };

        // 3D Visual Representation of the Arena
        let visualArena = []; // To keep track of Mesh objects
        function initVisualArena() {
            for(let y=0; y<ROWS; y++) {
                visualArena[y] = [];
                for(let x=0; x<COLS; x++) {
                    visualArena[y][x] = null;
                }
            }
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function rotate(matrix) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            matrix.forEach(row => row.reverse());
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                score += rowCount * 10;
                rowCount *= 2;
            }
            document.getElementById('score').innerText = "Score: " + score;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate() {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix);
                    rotate(player.matrix);
                    rotate(player.matrix);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                score = 0;
                document.getElementById('score').innerText = "Score: " + score;
            }
        }

        // --- RENDER LOOP ---
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function draw() {
            // Clear all 3D blocks from the scene before redrawing
            // (In a real game, we'd update positions instead of recreating,
            // but for a "simple" example, this is the easiest way to sync)
            while(scene.children.length > 2) { // Keep lights
                const obj = scene.children[scene.children.length - 1];
                if(obj.type === "Mesh") scene.remove(obj);
            }

            // Draw Arena
            arena.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const material = new THREE.MeshPhongMaterial({ color: colors[value] });
                        const mesh = new THREE.Mesh(cubeGeo, material);
                        mesh.position.set(x, ROWS - y, 0);
                        scene.add(mesh);
                    }
                });
            });

            // Draw Active Piece
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const material = new THREE.MeshPhongMaterial({ color: colors[value] });
                        const mesh = new THREE.Mesh(cubeGeo, material);
                        mesh.position.set(x + player.pos.x, ROWS - (y + player.pos.y), 0);
                        scene.add(mesh);
                    }
                });
            });
        }

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }
            draw();
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate();
        });

        initVisualArena();
        playerReset();
        update();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
