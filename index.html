<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POV: Tetris Horror - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; text-shadow: 0 0 5px #0f0; z-index: 100; }
        #score { font-size: 24px; }
        #warning { color: #ff0000; font-weight: bold; display: none; font-size: 20px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none;
                   justify-content: center; align-items: center; color: white;
                   background: rgba(0,0,0,0.9); font-size: 50px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">ALTITUDE: 0</div>
        <div id="warning">⚠️ CRITICAL MASS DETECTED ⚠️</div>
        <div style="font-size: 12px; margin-top: 10px;">ARROWS to move/rotate. Look up. Survive.</div>
    </div>
    <div id="overlay">CRUSHED!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const COLS = 12;
        const ROWS = 20;
        let score = 0;
        let gameOver = false;
        let arena = createMatrix(COLS, ROWS);

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        // Lowered fog density so the blocks are visible
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Separate group for blocks so we can clear them without deleting the walls/lights
        const gameGroup = new THREE.Group();
        scene.add(gameGroup);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x00ff00, 2, 50);
        pointLight.position.set(COLS/2, 2, 5);
        scene.add(pointLight);

        // POV CAMERA: Bottom of the well, looking up
        camera.position.set(COLS / 2, 0.5, 10);
        camera.lookAt(COLS / 2, ROWS / 2, 0);

        // ENVIRONMENT: The Well (Static objects)
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x222222, side: THREE.DoubleSide });

        // Back Wall
        const backWallGeo = new THREE.PlaneGeometry(COLS, ROWS);
        const backWall = new THREE.Mesh(backWallGeo, wallMat);
        backWall.position.set(COLS/2, ROWS/2, -1);
        scene.add(backWall);

        // Left and Right Walls
        const sideWallGeo = new THREE.BoxGeometry(1, ROWS, 2);
        const leftWall = new THREE.Mesh(sideWallGeo, wallMat);
        leftWall.position.set(0, ROWS/2, 0);
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(sideWallGeo, wallMat);
        rightWall.position.set(COLS, ROWS/2, 0);
        scene.add(rightWall);

        const colors = [null, 0xFF0D72, 0x0DC2FF, 0x0DFF72, 0xF538FF, 0xFF8E0D, 0xFFE138, 0x3877FF];
        const cubeGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);

        function createEye() {
            const eyeGroup = new THREE.Group();
            const white = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshPhongMaterial({color: 0xffffff}));
            const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshPhongMaterial({color: 0x000000}));
            pupil.position.y = -0.15; // Staring down at you
            eyeGroup.add(white);
            eyeGroup.add(pupil);
            return eyeGroup;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        const player = { pos: {x: 0, y: 0}, matrix: null };

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            matrix.forEach(row => row.reverse());
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                score += rowCount * 10;
                rowCount *= 2;
            }
            document.getElementById('score').innerText = "ALTITUDE: " + score;
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate() {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix); rotate(player.matrix); rotate(player.matrix);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                gameOver = true;
                document.getElementById('overlay').style.display = 'flex';
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function draw() {
            // CLEAR ONLY THE BLOCKS, not the walls or lights
            gameGroup.clear();

            arena.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const mesh = new THREE.Mesh(cubeGeo, new THREE.MeshPhongMaterial({ color: colors[value] }));
                        mesh.position.set(x + 0.5, (ROWS - 1) - y, 0);
                        gameGroup.add(mesh);
                    }
                });
            });

            let headX = 0, headY = 0;
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const mesh = new THREE.Mesh(cubeGeo, new THREE.MeshPhongMaterial({ color: colors[value] }));
                        mesh.position.set(x + player.pos.x + 0.5, (ROWS - 1) - (y + player.pos.y), 0);
                        gameGroup.add(mesh);
                        headX = x + player.pos.x + 0.5;
                        headY = (ROWS - 1) - (y + player.pos.y);
                    }
                });
            });

            const eyeL = createEye();
            const eyeR = createEye();
            eyeL.position.set(headX - 0.2, headY - 0.5, 0);
            eyeR.position.set(headX + 0.2, headY - 0.5, 0);
            gameGroup.add(eyeL);
            gameGroup.add(eyeR);

            const minHeight = Math.min(...arena.map((r, i) => r.some(v => v !== 0) ? i : ROWS));
            document.getElementById('warning').style.display = (minHeight < 5) ? 'block' : 'none';
        }

        function update(time = 0) {
            if(gameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate();
        });

        playerReset();
        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
